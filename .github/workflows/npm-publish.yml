name: Publish to npm

# Trusted Publishing (OIDC) — トークン不要・2FA不要・provenance 自動付与。
# 事前に npmjs.com のパッケージ設定で Trusted Publisher を登録すること:
#   Publisher = GitHub Actions / Org or user = 1llum1n4t1s
#   Repository = 1llum1n4t1s.cws-mcp / Workflow = npm-publish.yml
# 発火: バージョンタグ (v1.4.3 等) の push、または手動実行。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC トークン発行に必須

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # タグ (v1.4.3 等) と package.json の version が一致するか検証。
      # bump 忘れ・誤タグによる二重 publish / 誤バージョン公開を発火前に止める。
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag '$TAG' does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Tag and package.json agree on $PKG"

      # Trusted Publishing は npm >= 11.5.1 が必要 (Node 22 同梱版より新しい)
      - name: Ensure recent npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Trusted Publisher 設定済みなら OIDC で認証され、provenance も自動付与される
      - name: Publish
        run: npm publish
