name: Publish to npm

# npm publish — GitHub Secret の NPM_TOKEN (npmjs.com の Automation トークン) で認証する。
# Secret 登録: リポジトリ Settings → Secrets and variables → Actions → NPM_TOKEN
#   (gh CLI なら: gh secret set NPM_TOKEN < トークン)
# 発火: release/x.y.z ブランチの push、または手動実行。

on:
  push:
    branches:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: pnpm セットアップ
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # release/x.y.z ブランチ名と package.json の version が一致するか検証。
      # bump 忘れ・誤ブランチによる二重 publish / 誤バージョン公開を発火前に止める。
      - name: Verify release branch matches package.json version
        if: startsWith(github.ref_name, 'release/')
        run: |
          BR="${GITHUB_REF_NAME#release/}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$BR" != "$PKG" ]; then
            echo "::error::Release branch '$BR' does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Release branch and package.json agree on $PKG"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # NPM_TOKEN は setup-node が書いた .npmrc の _authToken に注入される
      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
