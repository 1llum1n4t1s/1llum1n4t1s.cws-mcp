# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    description: >-
      Provide EITHER a service account (cwsServiceAccountKey, recommended for
      CI/CD) OR the OAuth2 trio (cwsClientId + cwsClientSecret + cwsRefreshToken).
    properties:
      cwsServiceAccountKey:
        type: string
        description: Service account JSON key (raw JSON or a file path). Preferred when set.
      cwsClientId:
        type: string
        description: Google OAuth2 Client ID for Chrome Web Store API
      cwsClientSecret:
        type: string
        description: Google OAuth2 Client Secret
      cwsRefreshToken:
        type: string
        description: OAuth2 Refresh Token
      cwsPublisherId:
        type: string
        description: Publisher ID (default 'me')
      cwsItemId:
        type: string
        description: Default extension item ID
  commandFunction:
    |-
    config => ({ command: 'npx', args: ['-y', '@1llum1n4t1/cws-mcp'], env: { CWS_SERVICE_ACCOUNT_KEY: config.cwsServiceAccountKey || '', CWS_CLIENT_ID: config.cwsClientId || '', CWS_CLIENT_SECRET: config.cwsClientSecret || '', CWS_REFRESH_TOKEN: config.cwsRefreshToken || '', CWS_PUBLISHER_ID: config.cwsPublisherId || 'me', CWS_ITEM_ID: config.cwsItemId || '' } })
